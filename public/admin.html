<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f7a5c" />
    <title>FeriAPP Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        color-scheme: light;
        --green: #1f7a5c;
        --green-dark: #155c46;
        --cream: #fff8ed;
        --ink: #25324d;
        --muted: #667085;
        --line: #e2e6ee;
        --coral: #e76f51;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--cream);
        color: var(--ink);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      header {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 4px;
        font-size: 1.8rem;
      }

      p {
        color: var(--muted);
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: var(--green);
        color: white;
        padding: 10px 14px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        border: 1px solid var(--line);
        background: white;
        color: var(--ink);
      }

      .panel,
      .metric,
      .user-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        box-shadow: 0 14px 36px rgba(37, 50, 77, 0.08);
      }

      .panel {
        padding: 18px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .metric {
        padding: 14px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 1.5rem;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr);
        gap: 16px;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .user-card {
        padding: 13px;
      }

      .user-card strong {
        display: block;
      }

      .user-card small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .pill {
        border-radius: 999px;
        background: #f2f5f1;
        color: var(--ink);
        padding: 5px 8px;
        font-size: 0.78rem;
        font-weight: 800;
      }

      .pill.warn {
        background: #fff3f0;
        color: #a7442b;
      }

      .pill.good {
        background: #eaf7f1;
        color: var(--green-dark);
      }

      .signal {
        border-left: 4px solid var(--green);
      }

      .signal.warn {
        border-left-color: var(--coral);
      }

      .hidden {
        display: none;
      }

      .notice {
        border-left: 4px solid var(--coral);
        padding: 12px 14px;
        border-radius: 8px;
        background: #fff3f0;
      }

      @media (max-width: 820px) {
        header,
        .grid {
          display: grid;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>FeriAPP Admin</h1>
          <p>Panel privado para revisar uso, registros y señales del producto.</p>
        </div>
        <div>
          <button id="login">Entrar con Google</button>
          <button class="secondary hidden" id="logout">Salir</button>
        </div>
      </header>

      <section class="panel" id="status">
        <p>Conecta con tu cuenta administradora para ver los datos.</p>
      </section>

      <section class="hidden" id="dashboard">
        <div class="metrics" id="metrics"></div>

        <div class="grid">
          <section class="panel">
            <h2>Usuarios y negocios</h2>
            <div class="list" id="users"></div>
          </section>

          <section class="panel">
            <h2>Señales para mirar</h2>
            <div class="list" id="signals"></div>
          </section>

          <section class="panel">
            <h2>Productos más movidos</h2>
            <div class="list" id="top-products"></div>
          </section>

          <section class="panel">
            <h2>Actividad reciente</h2>
            <div class="list" id="events"></div>
          </section>
        </div>
      </section>
    </main>

    <script type="module">
      const loginButton = document.querySelector("#login");
      const logoutButton = document.querySelector("#logout");
      const statusBox = document.querySelector("#status");
      const dashboard = document.querySelector("#dashboard");
      const metricsBox = document.querySelector("#metrics");
      const usersBox = document.querySelector("#users");
      const signalsBox = document.querySelector("#signals");
      const topProductsBox = document.querySelector("#top-products");
      const eventsBox = document.querySelector("#events");

      const rawConfig = await fetch("/api/config").then((response) => response.json());
      const config = {
        supabaseUrl: cleanSupabaseUrl(rawConfig.supabaseUrl),
        supabaseAnonKey: cleanKey(rawConfig.supabaseAnonKey),
      };

      if (!config.supabaseUrl || !config.supabaseAnonKey) {
        statusBox.innerHTML = '<div class="notice">Faltan variables de entorno SUPABASE_URL y SUPABASE_ANON_KEY en Vercel.</div>';
        throw new Error("Missing Supabase config");
      }

      const client = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey, {
        auth: {
          autoRefreshToken: true,
          detectSessionInUrl: true,
          flowType: "implicit",
          persistSession: true,
        },
      });

      statusBox.innerHTML = "<p>Revisando tu acceso...</p>";
      await hydrateSessionFromRedirect(client);
      const session = await waitForSession(client);

      loginButton.addEventListener("click", async () => {
        statusBox.innerHTML = "<p>Abriendo Google...</p>";
        await client.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: `${location.origin}/admin.html` },
        });
      });

      logoutButton.addEventListener("click", async () => {
        await client.auth.signOut();
        location.reload();
      });

      if (!session) {
        statusBox.innerHTML = "<p>Inicia sesión con el Google que marcaste como administradora.</p>";
      } else {
        await loadDashboard(session);
      }

      async function loadDashboard(session) {
        loginButton.classList.add("hidden");
        logoutButton.classList.remove("hidden");

        const userId = session?.user?.id;
        const userEmail = session?.user?.email || "este correo";

        if (!userId) {
          statusBox.innerHTML = '<div class="notice">Google respondió, pero no pudimos leer el usuario. Cierra sesión e intenta entrar otra vez.</div>';
          return;
        }

        const adminCheck = await client.from("admin_users").select("user_id").eq("user_id", userId).maybeSingle();
        if (adminCheck.error || !adminCheck.data) {
          statusBox.innerHTML = `<div class="notice">Entraste con Google como ${escapeHtml(userEmail)}, pero ese correo todavía no está marcado como administrador en Supabase.</div>`;
          return;
        }

        const [profiles, products, sales, leftovers, events] = await Promise.all([
          client.from("perfiles").select("*").order("created_at", { ascending: false }),
          client.from("productos").select("id,user_id,nombre,precio,costo,sin_costo,activo,created_at").order("created_at", { ascending: false }).limit(500),
          client.from("ventas").select("id,user_id,fecha,canal,items,created_at").order("created_at", { ascending: false }).limit(500),
          client.from("sobrantes").select("id,user_id,fecha,items,created_at").order("created_at", { ascending: false }).limit(500),
          client.from("usage_events").select("id,user_id,event_name,metadata,created_at").order("created_at", { ascending: false }).limit(40),
        ]);

        const errors = [profiles, products, sales, leftovers, events].filter((result) => result.error);
        if (errors.length) {
          statusBox.innerHTML = `<div class="notice">${errors[0].error.message}</div>`;
          return;
        }

        statusBox.classList.add("hidden");
        dashboard.classList.remove("hidden");

        const productById = Object.fromEntries(products.data.map((product) => [product.id, product]));
        const salesSummary = summarizeSales(sales.data, productById);
        const leftoverSummary = summarizeLeftovers(leftovers.data, productById);
        const profileById = Object.fromEntries(profiles.data.map((profile) => [profile.id, profile]));
        const activeUsers = countActiveUsers(sales.data, events.data);

        metricsBox.innerHTML = [
          metric("Usuarios", profiles.data.length),
          metric("Activos 7 dias", activeUsers),
          metric("Productos", products.data.length),
          metric("Ventas", sales.data.length),
          metric("Ingresos anotados", clp(salesSummary.totalRevenue)),
          metric("Sobrantes", leftovers.data.length),
        ].join("");

        const productCount = countBy(products.data, "user_id");
        const salesCount = countBy(sales.data, "user_id");
        const leftoverCount = countBy(leftovers.data, "user_id");
        usersBox.innerHTML =
          profiles.data
            .map((profile) => {
              const title = profile.nombre_emprendimiento || "Sin nombre todavía";
              const revenue = salesSummary.revenueByUser[profile.id] || 0;
              const lastSeen = salesSummary.lastSaleByUser[profile.id] || lastEventByUser(events.data, profile.id);
              return `
                <article class="user-card">
                  <strong>${escapeHtml(title)}</strong>
                  <small>${escapeHtml(profile.tipo || "Rubro pendiente")} · ${escapeHtml(profile.canal_principal || "Canal pendiente")}</small>
                  <small>${productCount[profile.id] || 0} productos · ${salesCount[profile.id] || 0} ventas · ${leftoverCount[profile.id] || 0} registros de sobrantes</small>
                  <div class="tag-row">
                    <span class="pill ${profile.es_premium ? "good" : ""}">${profile.es_premium ? "Plus" : "Libre"}</span>
                    <span class="pill">${clp(revenue)}</span>
                    <span class="pill">${lastSeen ? `Ultimo uso ${formatDateTime(lastSeen)}` : "Sin actividad aun"}</span>
                  </div>
                </article>
              `;
            })
            .join("") || "<p>No hay usuarios todavía.</p>";

        const topProducts = Object.values(salesSummary.byProduct)
          .sort((a, b) => b.units - a.units || b.revenue - a.revenue)
          .slice(0, 6);

        topProductsBox.innerHTML =
          topProducts
            .map((item) => {
              const product = productById[item.id];
              return `
                <article class="user-card">
                  <strong>${escapeHtml(product?.nombre || "Producto eliminado")}</strong>
                  <small>${item.units} unidades anotadas · ${clp(item.revenue)}</small>
                  <div class="tag-row">
                    <span class="pill">${escapeHtml(product?.activo === false ? "Inactivo" : "Activo")}</span>
                    ${product?.sin_costo || !product?.costo ? '<span class="pill warn">Sin costo claro</span>' : `<span class="pill good">Costo ${clp(product.costo)}</span>`}
                  </div>
                </article>
              `;
            })
            .join("") || "<p>Aun no hay ventas para ordenar productos.</p>";

        signalsBox.innerHTML = buildSignals({
          profiles: profiles.data,
          products: products.data,
          sales: sales.data,
          leftovers: leftovers.data,
          events: events.data,
          salesSummary,
          leftoverSummary,
        })
          .map((signal) => `
            <article class="user-card signal ${signal.kind === "warn" ? "warn" : ""}">
              <strong>${escapeHtml(signal.title)}</strong>
              <small>${escapeHtml(signal.text)}</small>
            </article>
          `)
          .join("");

        eventsBox.innerHTML =
          events.data
            .map(
              (event) => {
                const profile = profileById[event.user_id];
                return `
                <article class="user-card">
                  <strong>${escapeHtml(eventLabel(event.event_name))}</strong>
                  <small>${escapeHtml(profile?.nombre_emprendimiento || "Usuario sin nombre")} · ${formatDateTime(event.created_at)}</small>
                  <small>${escapeHtml(eventSummary(event.metadata))}</small>
                </article>
              `;
              },
            )
            .join("") || "<p>Aún no hay eventos de uso.</p>";
      }

      function buildSignals({ profiles, products, sales, leftovers, events, salesSummary, leftoverSummary }) {
        const signals = [];
        const productsWithoutCost = products.filter((product) => product.sin_costo || !product.costo);
        const usersWithoutProducts = profiles.filter((profile) => !products.some((product) => product.user_id === profile.id));
        const usersWithoutSales = profiles.filter((profile) => !sales.some((sale) => sale.user_id === profile.id));
        const topLeftover = Object.values(leftoverSummary.byProduct).sort((a, b) => b.leftover - a.leftover)[0];

        if (usersWithoutProducts.length) {
          signals.push({
            kind: "warn",
            title: `${usersWithoutProducts.length} usuario(s) sin productos`,
            text: "Conviene revisar si el onboarding está claro o si falta acompañar la primera carga.",
          });
        }

        if (usersWithoutSales.length) {
          signals.push({
            kind: "warn",
            title: `${usersWithoutSales.length} usuario(s) sin ventas`,
            text: "El primer registro de venta es clave para validar si FeriAPP se entiende rápido.",
          });
        }

        if (productsWithoutCost.length) {
          signals.push({
            kind: "warn",
            title: `${productsWithoutCost.length} producto(s) sin costo`,
            text: "Aqui hay una oportunidad para ofrecer ayuda de calculo de costos como funcion premium.",
          });
        }

        if (topLeftover?.leftover > 0) {
          signals.push({
            kind: "info",
            title: "Sobrantes detectados",
            text: `${topLeftover.name} acumula ${topLeftover.leftover} sobrantes. Esta es una buena señal para recomendaciones de Modo Feria.`,
          });
        }

        if (salesSummary.totalRevenue > 0) {
          signals.push({
            kind: "info",
            title: "Ya hay ventas para analizar",
            text: `Los usuarios han anotado ${clp(salesSummary.totalRevenue)}. Con mas datos podremos mostrar productos seguros y precios a revisar.`,
          });
        }

        if (!events.length) {
          signals.push({
            kind: "warn",
            title: "Sin actividad registrada",
            text: "Cuando los usuarios usen botones clave, aqui aparecera la ruta de uso del producto.",
          });
        }

        if (!signals.length) {
          signals.push({
            kind: "info",
            title: "Todo listo para observar",
            text: "El panel ya puede mostrar uso, ventas, productos y señales de decision.",
          });
        }

        return signals;
      }

      function summarizeSales(sales, productById) {
        return sales.reduce(
          (summary, sale) => {
            summary.salesByUser[sale.user_id] = (summary.salesByUser[sale.user_id] || 0) + 1;
            summary.lastSaleByUser[sale.user_id] = newerDate(summary.lastSaleByUser[sale.user_id], sale.created_at || sale.fecha);

            (sale.items || []).forEach((item) => {
              const product = productById[item.pid];
              const units = Number(item.q || 0);
              const revenue = units * Number(product?.precio || 0);

              summary.totalUnits += units;
              summary.totalRevenue += revenue;
              summary.revenueByUser[sale.user_id] = (summary.revenueByUser[sale.user_id] || 0) + revenue;

              if (!summary.byProduct[item.pid]) {
                summary.byProduct[item.pid] = { id: item.pid, units: 0, revenue: 0 };
              }

              summary.byProduct[item.pid].units += units;
              summary.byProduct[item.pid].revenue += revenue;
            });

            return summary;
          },
          { byProduct: {}, revenueByUser: {}, salesByUser: {}, lastSaleByUser: {}, totalRevenue: 0, totalUnits: 0 },
        );
      }

      function summarizeLeftovers(leftovers, productById) {
        return leftovers.reduce(
          (summary, record) => {
            (record.items || []).forEach((item) => {
              const product = productById[item.pid];
              const leftover = Number(item.sobro || 0);
              const prepared = Number(item.lleve || 0);

              if (!summary.byProduct[item.pid]) {
                summary.byProduct[item.pid] = { id: item.pid, name: product?.nombre || "Producto eliminado", leftover: 0, prepared: 0 };
              }

              summary.byProduct[item.pid].leftover += leftover;
              summary.byProduct[item.pid].prepared += prepared;
            });

            return summary;
          },
          { byProduct: {} },
        );
      }

      function countActiveUsers(sales, events) {
        const since = Date.now() - 7 * 24 * 60 * 60 * 1000;
        const ids = new Set();

        sales.forEach((sale) => {
          if (new Date(sale.created_at || sale.fecha).getTime() >= since) ids.add(sale.user_id);
        });

        events.forEach((event) => {
          if (new Date(event.created_at).getTime() >= since) ids.add(event.user_id);
        });

        return ids.size;
      }

      function lastEventByUser(events, userId) {
        return events.find((event) => event.user_id === userId)?.created_at || null;
      }

      function newerDate(current, next) {
        if (!current) return next;
        if (!next) return current;
        return new Date(next).getTime() > new Date(current).getTime() ? next : current;
      }

      function eventLabel(name) {
        const labels = {
          login: "Entro a FeriAPP",
          venta_rapida_guardada: "Guardo venta rapida",
          resumen_dia_guardado: "Guardo resumen del dia",
          producto_creado: "Agrego producto",
          producto_eliminado: "Elimino producto",
          sobrantes_guardados: "Guardo sobrantes",
          modo_feria_basico: "Uso Modo Feria",
          modo_feria_ia: "Pidio recomendacion IA",
        };

        return labels[name] || name;
      }

      function eventSummary(metadata) {
        if (!metadata || typeof metadata !== "object") return "Sin detalle adicional";
        const parts = [];

        if (metadata.canal) parts.push(`Canal ${metadata.canal}`);
        if (metadata.total_unidades) parts.push(`${metadata.total_unidades} unidades`);
        if (metadata.total_sobrantes) parts.push(`${metadata.total_sobrantes} sobrantes`);
        if (metadata.nombre) parts.push(metadata.nombre);

        return parts.join(" · ") || "Sin detalle adicional";
      }

      function clp(value) {
        return new Intl.NumberFormat("es-CL", {
          style: "currency",
          currency: "CLP",
          maximumFractionDigits: 0,
        }).format(Number(value || 0));
      }

      function formatDateTime(value) {
        if (!value) return "";
        return new Intl.DateTimeFormat("es-CL", {
          day: "2-digit",
          month: "short",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function metric(label, value) {
        return `<article class="metric"><span>${label}</span><strong>${value}</strong></article>`;
      }

      function countBy(rows, key) {
        return rows.reduce((acc, row) => {
          acc[row[key]] = (acc[row[key]] || 0) + 1;
          return acc;
        }, {});
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cleanKey(value) {
        return String(value ?? "").replace(/\s/g, "");
      }

      function cleanSupabaseUrl(value) {
        const cleaned = String(value ?? "").trim().replace(/\/+$/, "");
        if (!cleaned) return "";

        try {
          return new URL(cleaned).origin;
        } catch {
          return cleaned;
        }
      }

      async function hydrateSessionFromRedirect(client) {
        const url = new URL(location.href);
        const code = url.searchParams.get("code");

        if (code) {
          history.replaceState(null, document.title, `${location.origin}/admin.html`);
          statusBox.innerHTML = '<div class="notice">Se limpió un intento anterior de ingreso. Presiona "Entrar con Google" una vez más.</div>';
          return;
        }

        const hash = new URLSearchParams(location.hash.replace(/^#/, ""));
        const accessToken = hash.get("access_token");
        const refreshToken = hash.get("refresh_token");

        if (!accessToken || !refreshToken) return;

        const { error } = await client.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        });

        if (error) {
          statusBox.innerHTML = `<div class="notice">No pudimos guardar tu sesión de Google: ${escapeHtml(error.message)}</div>`;
          return;
        }

        history.replaceState(null, document.title, `${location.origin}/admin.html`);
      }

      async function waitForSession(client) {
        for (let attempt = 0; attempt < 8; attempt += 1) {
          const { data, error } = await client.auth.getSession();
          if (error) return null;
          if (data.session) return data.session;
          await new Promise((resolve) => setTimeout(resolve, 250));
        }

        return null;
      }
    </script>
  </body>
</html>
